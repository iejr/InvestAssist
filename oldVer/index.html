<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Value Average Investor Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .form-input {
            @apply w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors;
        }
        .form-label {
            @apply block mb-2 text-sm font-medium text-gray-700;
        }
        .card {
            @apply bg-white p-6 rounded-xl shadow-md;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <div class="container mx-auto p-4 md:p-8">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-900">Value Average Investor Simulator</h1>
            <p class="text-lg text-gray-600 mt-2">Visualize your investment strategy and see how it performs.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left Panel: Controls -->
            <div class="lg:col-span-1">
                <div class="card space-y-6">
                    <div>
                        <h2 class="text-2xl font-semibold mb-4">Strategy Parameters</h2>
                    </div>
                    
                    <form id="va-form" class="space-y-4">
                        <div>
                            <label for="security-name" class="form-label">Security Name</label>
                            <input type="text" id="security-name" class="form-input" value="SPY 500">
                        </div>
                        <div>
                            <label for="starting-value" class="form-label">Starting Value ($)</label>
                            <input type="number" id="starting-value" class="form-input" value="1000" step="100">
                        </div>
                        <div>
                            <label for="starting-date" class="form-label">Starting Date</label>
                            <input type="date" id="starting-date" class="form-input" value="2023-01-01">
                        </div>
                        <div>
                            <label for="increment-value" class="form-label">Increment Value ($)</label>
                            <input type="number" id="increment-value" class="form-input" value="500" step="50">
                        </div>
                        <div>
                            <label for="increment-period" class="form-label">Increment Period</label>
                            <select id="increment-period" class="form-input">
                                <option value="monthly" selected>Monthly</option>
                                <option value="weekly">Weekly</option>
                                <option value="yearly">Yearly</option>
                            </select>
                        </div>
                        <div>
                            <label for="csv-file" class="form-label">Market Data (CSV)</label>
                            <input type="file" id="csv-file" accept=".csv" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                            <p class="text-xs text-gray-500 mt-1">Must contain 'Date' (YYYY-MM-DD) and 'Price' columns.</p>
                        </div>
                        
                        <button type="submit" id="run-simulation" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-transform transform hover:scale-105">
                            Run Simulation
                        </button>
                    </form>
                </div>
                <div id="results-summary" class="card mt-8 hidden">
                     <h2 class="text-2xl font-semibold mb-4">Simulation Results</h2>
                     <div id="summary-content" class="space-y-3 text-gray-700"></div>
                </div>
            </div>

            <!-- Right Panel: Chart and Info -->
            <div class="lg:col-span-2">
                <div class="card h-full">
                    <div id="chart-container" class="relative h-96 md:h-[500px]">
                        <canvas id="va-chart"></canvas>
                    </div>
                    <div id="message-area" class="text-center p-4 text-gray-500">
                        Please fill out the form and upload a CSV to start the simulation.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- DOM Element References ---
        const form = document.getElementById('va-form');
        const runButton = document.getElementById('run-simulation');
        const fileInput = document.getElementById('csv-file');
        const messageArea = document.getElementById('message-area');
        const resultsSummary = document.getElementById('results-summary');
        const summaryContent = document.getElementById('summary-content');
        const chartContainer = document.getElementById('chart-container');
        
        let vaChart = null;

        // --- Chart Initialization ---
        const initializeChart = () => {
            const ctx = document.getElementById('va-chart').getContext('2d');
            if (vaChart) {
                vaChart.destroy();
            }
            vaChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: []
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: 'Date'
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: 'Value ($)'
                            },
                            beginAtZero: true
                        }
                    },
                    plugins: {
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) {
                                        label += ': ';
                                    }
                                    if (context.parsed.y !== null) {
                                        label += new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(context.parsed.y);
                                    }
                                    return label;
                                }
                            }
                        },
                        legend: {
                            position: 'top',
                        },
                    },
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    }
                }
            });
        };
        
        // --- Event Listeners ---
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            handleSimulation();
        });

        // --- Core Logic ---
        const handleSimulation = () => {
            const file = fileInput.files[0];
            if (!file) {
                showMessage('Please upload a CSV file with market data.', 'error');
                return;
            }

            runButton.disabled = true;
            runButton.textContent = 'Processing...';
            showMessage('Parsing CSV file...', 'loading');

            Papa.parse(file, {
                header: true,
                dynamicTyping: true,
                skipEmptyLines: true,
                complete: (results) => {
                    if (!results.data.length || !results.meta.fields.includes('Date') || !results.meta.fields.includes('Price')) {
                        showMessage("Error: CSV must have 'Date' and 'Price' columns.", 'error');
                        resetButton();
                        return;
                    }
                    runValueAveraging(results.data);
                },
                error: (err) => {
                    showMessage(`CSV Parsing Error: ${err.message}`, 'error');
                    resetButton();
                }
            });
        };

        const runValueAveraging = (marketData) => {
            showMessage('Running simulation...', 'loading');
            
            // // --- Get Inputs ---
            // const startingValue = parseFloat(document.getElementById('starting-value').value);
            // const startingDate = new Date(document.getElementById('starting-date').value + 'T00:00:00'); // Normalize date
            const incrementValue = parseFloat(document.getElementById('increment-value').value);
            // const incrementPeriod = document.getElementById('increment-period').value;

            // // --- Prepare Market Data ---
            // const priceMap = new Map();
            // marketData.forEach(row => {
            //     if (row.Date && row.Price !== null) {
            //         // Handle various date formats PapaParse might output
            //         const dateStr = new Date(row.Date).toISOString().split('T')[0];
            //         priceMap.set(dateStr, row.Price);
            //     }
            // });

            // // --- Simulation Loop ---
            // const simulationResults = [];
            // let currentDate = new Date(startingDate);
            // let periodCount = 0;
            // let totalShares = 0;
            // let totalCashInvested = 0;

            // const endDate = new Date(marketData[marketData.length - 1].Date);

            // while (currentDate <= endDate) {
            //     const dateString = currentDate.toISOString().split('T')[0];
            //     const price = getPriceForDate(dateString, priceMap, marketData);

            //     if (price === null) {
            //         // If no price, skip to next period
            //         currentDate = getNextDate(currentDate, incrementPeriod);
            //         continue;
            //     }

            //     const expectedValue = startingValue + (periodCount * incrementValue);
                
            //     // On the first period, invest the starting value
            //     if (periodCount === 0) {
            //         totalShares = startingValue / price;
            //         totalCashInvested = startingValue;
            //     }

            //     const actualValue = totalShares * price;
            //     const investmentNeeded = expectedValue - actualValue;

            //     simulationResults.push({
            //         date: dateString,
            //         expectedValue,
            //         actualValue,
            //         investmentNeeded,
            //         price
            //     });

            //     // Perform the investment for the *next* period's calculation
            //     if (investmentNeeded > 0) {
            //         const sharesToBuy = investmentNeeded / price;
            //         totalShares += sharesToBuy;
            //         totalCashInvested += investmentNeeded;
            //     }
            //     // Note: This simple model doesn't sell if overvalued.

            //     periodCount++;
            //     currentDate = getNextDate(new Date(startingDate), incrementPeriod, periodCount);
            // }
            
            // if (simulationResults.length < 2) {
            //     showMessage('Not enough data for the selected period. Try an earlier start date or a different file.', 'error');
            //     resetButton();
            //     return;
            // }

            // Bake data
            const simulationResults = [];
            let expectedValue = 0;
            let quantity = 0;
            let totalCashInvested = 0;
            marketData.forEach(row => {
                if (row.Date && row.Price !== null && row.Qty !== null) {
                    // Handle various date formats PapaParse might output
                    const dateStr = new Date(row.Date).toISOString().split('T')[0];
                    const price = row.Price;

                    if (quantity == 0) {
                        totalCashInvested = row.Qty * price;
                    }
                    else {
                        totalCashInvested += (row.Qty - quantity) * price;
                    }

                    quantity = row.Qty;
                    const actualValue = price * quantity;
                    if (expectedValue == 0) {
                        expectedValue = actualValue;
                    } 
                    else {
                        expectedValue += incrementValue;
                    }
                    const investmentNeeded = expectedValue - actualValue;

                    simulationResults.push({
                        date: dateStr,
                        expectedValue,
                        actualValue,
                        investmentNeeded,
                        price
                    });
                }
            });


            // --- Update UI ---
            updateChart(simulationResults);
            updateSummary(simulationResults, totalCashInvested);
            showMessage(''); // Clear message area
            resetButton();
        };

        const updateChart = (data) => {
            const labels = data.map(d => d.date);
            const expectedValues = data.map(d => d.expectedValue);
            const actualValues = data.map(d => d.actualValue);

            vaChart.data.labels = labels;
            vaChart.data.datasets = [
                {
                    label: 'Expected Value Path',
                    data: expectedValues,
                    borderColor: 'rgb(59, 130, 246)',
                    backgroundColor: 'rgba(59, 130, 246, 0.5)',
                    tension: 0.1,
                    borderWidth: 2,
                },
                {
                    label: 'Actual Portfolio Value',
                    data: actualValues,
                    borderColor: 'rgb(22, 163, 74)',
                    backgroundColor: 'rgba(22, 163, 74, 0.5)',
                    tension: 0.1,
                    borderWidth: 2,
                }
            ];
            vaChart.update();
        };
        
        const updateSummary = (data, totalCashInvested) => {
            const finalResult = data[data.length - 1];
            // const nextInvestment = data.length > 1 ? (data[data.length-1].expectedValue + parseFloat(document.getElementById('increment-value').value)) - finalResult.actualValue : 0;
            const nextInvestment = data.length > 1 ? (finalResult.expectedValue - finalResult.actualValue) : 0;

            const formatCurrency = (value) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(value);

            summaryContent.innerHTML = `
                <p><strong>Final Portfolio Value:</strong> ${formatCurrency(finalResult.actualValue)}</p>
                <p><strong>Total Cash Invested:</strong> ${formatCurrency(totalCashInvested)}</p>
                <p><strong>Total Gain/Loss:</strong> ${formatCurrency(finalResult.actualValue - totalCashInvested)}</p>
                <hr class="my-2">
                <p class="text-lg"><strong>Next Required Investment:</strong> <span class="font-bold ${nextInvestment > 0 ? 'text-green-600' : 'text-red-600'}">${formatCurrency(nextInvestment)}</span></p>
                <p class="text-xs text-gray-500">A negative value suggests you are ahead of your value path.</p>
            `;
            resultsSummary.classList.remove('hidden');
        };

        // --- Helper Functions ---
        const getPriceForDate = (dateStr, priceMap) => {
            // Simple lookup, could be improved to find nearest date
            return priceMap.get(dateStr) || null;
        };

        const getNextDate = (baseDate, period, count) => {
            const d = new Date(baseDate);
            switch (period) {
                case 'weekly':
                    d.setDate(d.getDate() + (7 * count));
                    break;
                case 'yearly':
                    d.setFullYear(d.getFullYear() + count);
                    break;
                case 'monthly':
                default:
                    d.setMonth(d.getMonth() + count);
                    break;
            }
            return d;
        };

        const showMessage = (msg, type = 'info') => {
            messageArea.textContent = msg;
            messageArea.classList.remove('text-red-500', 'text-green-500', 'text-gray-500');
            switch(type) {
                case 'error':
                    messageArea.classList.add('text-red-500');
                    break;
                case 'success':
                     messageArea.classList.add('text-green-500');
                    break;
                default:
                     messageArea.classList.add('text-gray-500');
            }
        };
        
        const resetButton = () => {
            runButton.disabled = false;
            runButton.textContent = 'Run Simulation';
        };

        // --- Initial Load ---
        window.onload = () => {
            initializeChart();
        };

    </script>
</body>
</html>
